<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portal Shell</title>
    <link rel="stylesheet" href="./node_modules/@xterm/xterm/css/xterm.css">
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #171d23;
        --panel-strong: #1f2830;
        --text: #e6eaee;
        --muted: #97a1ad;
        --line: #2a343e;
        --ok: #7bc47f;
        --warn: #f4c95d;
        --bad: #e26d5a;
        --accent: #66c2c9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 720px;
        min-height: 520px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: #121820;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 18px;
        font-weight: 650;
      }

      h2 {
        font-size: 14px;
        font-weight: 650;
      }

      .socket {
        color: var(--muted);
        font-family: SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      main {
        display: grid;
        grid-template-columns: minmax(300px, 360px) minmax(420px, 1fr);
        min-height: 0;
      }

      .sidebar {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        border-right: 1px solid var(--line);
      }

      section {
        min-width: 0;
        min-height: 0;
      }

      .panel {
        padding: 16px;
      }

      .panel + .panel {
        border-top: 1px solid var(--line);
      }

      .panel-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .message {
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .is-ok {
        color: var(--ok);
      }

      .is-error {
        color: var(--bad);
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat-item {
        min-height: 58px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .stat-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .stat-item strong {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }

      .events {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
      }

      .events-list {
        display: grid;
        align-content: start;
        gap: 8px;
        min-height: 0;
        margin: 0;
        padding: 0 2px 0 0;
        overflow: auto;
        list-style: none;
      }

      .event-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 4px 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        background: var(--panel);
      }

      .notify-row {
        border-left-color: var(--warn);
      }

      .event-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 650;
      }

      .event-body {
        grid-column: 1 / -1;
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      time {
        color: var(--muted);
        font-size: 11px;
      }

      .terminal-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        padding: 16px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      .toolbar input {
        min-width: 0;
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        outline: none;
      }

      .toolbar input:focus {
        border-color: var(--accent);
      }

      .toolbar button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel-strong);
        color: var(--text);
      }

      .toolbar button:disabled {
        color: var(--muted);
        cursor: not-allowed;
        opacity: 0.65;
      }

      .terminal-wrap {
        min-height: 0;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: #0d1117;
      }

      #terminal-host {
        width: 100%;
        height: 100%;
        min-height: 260px;
        padding: 8px;
      }

      @media (max-width: 860px) {
        body {
          min-width: 0;
        }

        main {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(360px, 1fr);
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header>
        <h1>Portal Shell</h1>
        <div id="socket-path" class="socket"></div>
      </header>
      <main>
        <div class="sidebar">
          <section class="panel">
            <div class="panel-heading">
              <h2>Status</h2>
              <span id="status-message" class="message">pending</span>
            </div>
            <div id="status-grid" class="status-grid"></div>
          </section>
          <section class="panel events">
            <div class="panel-heading">
              <h2>Events</h2>
              <span id="events-message" class="message">pending</span>
            </div>
            <ol id="events-list" class="events-list"></ol>
          </section>
        </div>
        <section class="terminal-panel">
          <div class="panel-heading">
            <h2>Exec</h2>
            <span id="terminal-message" class="message">pending</span>
          </div>
          <div class="toolbar">
            <input id="command-input" type="text" spellcheck="false" autocomplete="off" placeholder="shell">
            <button id="start-exec" type="button">Start</button>
            <button id="stop-exec" type="button" disabled>Stop</button>
          </div>
          <div class="terminal-wrap">
            <div id="terminal-host"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="./node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>

# portal CI — runs on every push and pull request: build the agent +
# go test ./..., plus the TypeScript reference client's typecheck and tests.
name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.x
      - run: make test-ts

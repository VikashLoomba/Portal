# portal CI — runs on every push and pull request: build the agent + go test ./...
name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make test

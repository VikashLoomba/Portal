# portal CI/CD pipeline
#
# Jobs:
#   test    — runs on every push/MR: build agent + run go test ./...
#   release — runs only on version tags (v*): build both Mac architectures
#             and publish them as a GitLab release with downloadable artifacts

default:
  image: golang:1.25
  tags:
    - docker

variables:
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"

# Cache the Go module download cache across jobs on the same branch.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .go-cache/
before_script:
  - export GOPATH="$CI_PROJECT_DIR/.go-cache"
  - export GOMODCACHE="$CI_PROJECT_DIR/.go-cache/pkg/mod"

# ── test ──────────────────────────────────────────────────────────────────────
test:
  stage: test
  script:
    - make test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── release ───────────────────────────────────────────────────────────────────
release-build:
  stage: build
  script:
    - make portal-all
  artifacts:
    name: "portal-${CI_COMMIT_TAG}"
    paths:
      - portal-darwin-amd64
      - portal-darwin-arm64
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

release-publish:
  stage: deploy
  # Use golang image (already on the runners) rather than release-cli, which
  # fails TLS verification against the internal GitLab CA. We call the API
  # directly with curl --insecure (internal network, job token scoped to this
  # project).
  image: golang:1.25
  tags:
    - docker
  needs:
    - job: release-build
      artifacts: true
  script:
    - |
      ARTIFACT_BASE="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw"
      DESCRIPTION="Download the binary for your Mac, mark it executable, and run portal install.

      Apple Silicon (M1/M2/M3/M4): ${ARTIFACT_BASE}/portal-darwin-arm64?job=release-build
      Intel Mac:                    ${ARTIFACT_BASE}/portal-darwin-amd64?job=release-build

      chmod +x portal && ./portal install"

      # Create the release via the GitLab API.
      curl --insecure --fail-with-body -sS \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(printf '{
          "name": "portal %s",
          "tag_name": "%s",
          "description": %s,
          "assets": {
            "links": [
              {"name": "portal-darwin-arm64 (Apple Silicon)", "url": "%s/portal-darwin-arm64?job=release-build", "link_type": "package"},
              {"name": "portal-darwin-amd64 (Intel Mac)",     "url": "%s/portal-darwin-amd64?job=release-build", "link_type": "package"}
            ]
          }
        }' \
          "${CI_COMMIT_TAG}" \
          "${CI_COMMIT_TAG}" \
          "$(echo "$DESCRIPTION" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')" \
          "${ARTIFACT_BASE}" \
          "${ARTIFACT_BASE}")" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      echo "Release ${CI_COMMIT_TAG} published."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

stages:
  - test
  - build
  - deploy

# portal CI/CD pipeline
#
# Jobs:
#   test    — runs on every push/MR: build agent + run go test ./...
#   release — runs only on version tags (v*): build the Apple Silicon binary,
#             publish it to the generic package registry, and create a GitLab
#             release whose asset link points at the package (so a plain
#             `glab release download` fetches the real binary — the job-artifacts
#             web route sits behind SSO and returns a login page instead).

default:
  image: golang:1.25
  tags:
    - docker

variables:
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"

# Cache the Go module download cache across jobs on the same branch.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .go-cache/
before_script:
  - export GOPATH="$CI_PROJECT_DIR/.go-cache"
  - export GOMODCACHE="$CI_PROJECT_DIR/.go-cache/pkg/mod"

# ── test ──────────────────────────────────────────────────────────────────────
test:
  stage: test
  script:
    - make test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── release ───────────────────────────────────────────────────────────────────
release-build:
  stage: build
  script:
    - make portal-all
  artifacts:
    name: "portal-${CI_COMMIT_TAG}"
    paths:
      - portal-darwin-arm64
    expire_in: 90 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

release-publish:
  stage: deploy
  # Use golang image (already on the runners) rather than release-cli, which
  # fails TLS verification against the internal GitLab CA. We call the API
  # directly with curl --insecure (internal network, job token scoped to this
  # project).
  image: golang:1.25
  tags:
    - docker
  needs:
    - job: release-build
      artifacts: true
  script:
    - |
      # 1. Upload the binary to the generic package registry. This route is
      #    reachable with the job token / a user's glab login — unlike the
      #    job-artifacts web route, which sits behind SSO and hands back an HTML
      #    login page to non-browser clients. `glab release download` follows
      #    the asset link, so it MUST point here to get the real binary.
      PKG_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/portal/${CI_COMMIT_TAG}/portal-darwin-arm64"
      curl --insecure --fail-with-body -sS \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file portal-darwin-arm64 \
        "${PKG_URL}"
      echo "Uploaded portal-darwin-arm64 to the package registry."

      # 2. Create the release with a single asset link -> the package above.
      DESCRIPTION="Apple Silicon (arm64) Mac build. Download the latest with glab:

      glab release download -R ${CI_PROJECT_URL} --asset-name=portal-darwin-arm64
      chmod +x portal-darwin-arm64
      ./portal-darwin-arm64 install <ssh-host>"

      curl --insecure --fail-with-body -sS \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$(printf '{
          "name": "portal %s",
          "tag_name": "%s",
          "description": %s,
          "assets": {
            "links": [
              {"name": "portal-darwin-arm64", "url": "%s", "link_type": "package"}
            ]
          }
        }' \
          "${CI_COMMIT_TAG}" \
          "${CI_COMMIT_TAG}" \
          "$(echo "$DESCRIPTION" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')" \
          "${PKG_URL}")" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      echo "Release ${CI_COMMIT_TAG} published."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

stages:
  - test
  - build
  - deploy
